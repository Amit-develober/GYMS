<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background radial glow -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#141c33" />
      <stop offset="100%" stop-color="#060b16" />
    </radialGradient>
    
    <!-- Neon energy gradient -->
    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#9b51e0" />
    </linearGradient>
    
    <!-- Intense neon glow filter -->
    <filter id="glow-effect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur" />
      <feComponentTransfer in="blur" result="bright-blur">
        <feFuncA type="linear" slope="1.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="bright-blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Rounded Container -->
  <rect width="512" height="512" rx="112" fill="url(#bg-glow)" stroke="rgba(255,255,255,0.06)" stroke-width="4"/>
  
  <!-- Logo Emblem Group -->
  <g transform="translate(0, 15)" filter="url(#glow-effect)">
    <!-- Central Dumbbell Shaft -->
    <rect x="240" y="160" width="32" height="180" rx="8" fill="url(#neon-grad)" opacity="0.8"/>
    
    <!-- Dumbbell weight stacks (Left) -->
    <rect x="172" y="210" width="36" height="80" rx="10" fill="url(#neon-grad)" opacity="0.9"/>
    <rect x="144" y="225" width="20" height="50" rx="6" fill="url(#neon-grad)" opacity="0.6"/>
    
    <!-- Dumbbell weight stacks (Right) -->
    <rect x="304" y="210" width="36" height="80" rx="10" fill="url(#neon-grad)" opacity="0.9"/>
    <rect x="348" y="225" width="20" height="50" rx="6" fill="url(#neon-grad)" opacity="0.6"/>
    
    <!-- Outer sharp letter 'A' contour -->
    <path d="M 256 105 L 370 335 L 315 335 L 256 215 L 197 335 L 142 335 Z" fill="url(#neon-grad)" stroke="url(#neon-grad)" stroke-width="4" stroke-linejoin="round" opacity="0.95"/>
    
    <!-- Letter A horizontal bar -->
    <rect x="202" y="265" width="108" height="16" rx="4" fill="url(#neon-grad)"/>
  </g>
</svg>
